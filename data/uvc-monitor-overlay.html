<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVC Camera Monitor & Control</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        header {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .status-disconnected { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .status-connected { background-color: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* PTZ Controls */
        .ptz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            width: 180px;
            margin: 0 auto;
        }

        .ptz-btn {
            aspect-ratio: 1;
            background-color: #334155;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ptz-btn:hover { background-color: var(--accent-color); transform: scale(1.05); }
        .ptz-btn:active { transform: scale(0.95); }

        .slider-group {
            margin-top: 2rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        /* Device Selection */
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .device-item {
            background-color: #334155;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .device-item.active {
            border-color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.1);
        }

        .device-name { font-weight: 600; }
        .device-info { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }

        /* Polling */
        .polling-group {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fps-display { font-weight: bold; color: var(--accent-color); }
    </style>
</head>
<body>
    <header>
        <h1>UVC MONITOR</h1>
        <div id="connectionStatus" class="status-badge status-disconnected">DISCONNECTED</div>
    </header>

    <div class="container">
        <!-- Device & Settings -->
        <div class="card">
            <h2>Active Cameras</h2>
            <div id="deviceList" class="device-list">
                <div class="device-info">Waiting for status updates...</div>
            </div>

            <div class="polling-group">
                <div class="slider-label">
                    <span>Polling Rate</span>
                    <span class="fps-display"><span id="fpsValue">10</span> FPS</span>
                </div>
                <input type="range" id="pollingRate" min="0" max="60" value="10">
                <div class="device-info" style="margin-top: 0.5rem;">Set to 0 to disable polling. Higher values may increase CPU usage.</div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="card">
            <h2>PTZ Control</h2>
            <div class="ptz-grid">
                <div></div>
                <button class="ptz-btn" onmousedown="move('up')">▲</button>
                <div></div>
                
                <button class="ptz-btn" onmousedown="move('left')">◀</button>
                <button class="ptz-btn" style="background-color: #475569;">●</button>
                <button class="ptz-btn" onmousedown="move('right')">▶</button>
                
                <div></div>
                <button class="ptz-btn" onmousedown="move('down')">▼</button>
                <div></div>
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>Zoom</span>
                    <span id="zoomValue">0</span>
                </div>
                <input type="range" id="zoomSlider" min="0" max="1000" value="0">
            </div>

            <div style="margin-top: 2rem;">
                <h2>Current Stats</h2>
                <div id="stats" class="device-info">
                    Pan: <span id="statPan">0</span> | Tilt: <span id="statTilt">0</span> | Zoom: <span id="statZoom">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let selectedDevice = null;
        let devices = {};
        let port = 12349; // Default MediaWarp port

        async function discover() {
            try {
                const response = await fetch('http://localhost:12348/api/config');
                const config = await response.json();
                if (config.websocket_port) {
                    port = config.websocket_port;
                    connect();
                }
            } catch (e) {
                console.log("Discovery failed, retrying in 2s...");
                setTimeout(discover, 2000);
            }
        }

        function connect() {
            ws = new WebSocket(`ws://localhost:${port}`);

            ws.onopen = () => {
                document.getElementById('connectionStatus').textContent = 'CONNECTED';
                document.getElementById('connectionStatus').className = 'status-badge status-connected';
                // Send initial polling rate
                sendPollingRate();
            };

            ws.onclose = () => {
                document.getElementById('connectionStatus').textContent = 'DISCONNECTED';
                document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
                setTimeout(discover, 2000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.a === 'uvc_status') {
                    handleStatus(msg);
                }
            };
        }

        function handleStatus(msg) {
            const devName = msg.device;
            devices[devName] = msg.status;

            if (!selectedDevice) selectedDevice = devName;

            updateDeviceList();
            
            if (selectedDevice === devName) {
                document.getElementById('statPan').textContent = msg.status.pan;
                document.getElementById('statTilt').textContent = msg.status.tilt;
                document.getElementById('statZoom').textContent = msg.status.zoom;
                
                // Update zoom slider if not being dragged
                if (!document.getElementById('zoomSlider').matches(':active')) {
                    document.getElementById('zoomSlider').value = msg.status.zoom;
                    document.getElementById('zoomValue').textContent = msg.status.zoom;
                }
            }
        }

        function updateDeviceList() {
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            
            Object.keys(devices).forEach(name => {
                const item = document.createElement('div');
                item.className = `device-item ${selectedDevice === name ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="device-name">${name}</div>
                    <div class="device-info">Streaming property data</div>
                `;
                item.onclick = () => {
                    selectedDevice = name;
                    updateDeviceList();
                };
                list.appendChild(item);
            });
        }

        function send(payload) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(payload));
            }
        }

        function move(dir) {
            if (!selectedDevice) return;
            let pan = devices[selectedDevice]?.pan || 0;
            let tilt = devices[selectedDevice]?.tilt || 0;
            
            const step = 500;
            if (dir === 'up') tilt += step;
            if (dir === 'down') tilt -= step;
            if (dir === 'left') pan -= step;
            if (dir === 'right') pan += step;

            send({
                a: 'uvc_set_ptz',
                device: selectedDevice,
                pan: pan,
                tilt: tilt
            });
        }

        document.getElementById('zoomSlider').oninput = (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('zoomValue').textContent = val;
            if (selectedDevice) {
                send({
                    a: 'uvc_set_zoom',
                    device: selectedDevice,
                    zoom: val
                });
            }
        };

        document.getElementById('pollingRate').oninput = (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('fpsValue').textContent = val;
            sendPollingRate();
        };

        function sendPollingRate() {
            const val = parseInt(document.getElementById('pollingRate').value);
            send({
                a: 'uvc_set_polling',
                fps: val
            });
        }

        discover();
    </script>
</body>
</html>
